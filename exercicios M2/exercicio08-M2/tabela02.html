<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Tabelas Grandes</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>TABELAS GRANDES</h1>
    <!--
        ANATOMIA PARA TABELAS GRANDES 
        -TABLE
              CAPTION
              THEADER
              TR , TD , TH
              TBODY
              TR , TD , TH
              TFOOTER
              TR , TD , TH
    -->
              <table>
                <caption>População das Unidades Federativas </caption>
                <thead>
                    <tr>
                        <th>Estado</th>
                        <th>População</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td class="est">São Paulo</td>
                        <td class="num">45 919 049</td>
                    </tr>

                    <td class="est">Piauí</td>
                    <td class="num">21 168 791</td>

                    <tr>
                        <td class="est">Bahia</td>
                        <td class="num">17 264 943</td>
                    </tr>
                </tbody>

                <tfoot>
                    <tr>
                        <th>Total de Habitantes</th>
                        <td><strong>00000</strong></td>
                    </tr>
                </tfoot>
              </table>
  
    
</body>
</html>
