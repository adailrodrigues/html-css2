<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        h1{ /*Box-level*/
           background-color: rgb(142, 142, 142);
            height: 300px;
            width: 300px;

            border: 10px solid darkblue;

            padding: 10px 10px 10px 10px;

            margin: 20px 20px 40px 20px;

            outline: 5px dashed salmon;

        }

        a{ /*Inline-level*/
          border-width: 5px;
          border-style: solid;
          border-color: aquamarine;

          padding: 10px;
        }
    </style>
</head>
<body>
    <h1>EXEMPLO DE CAIXA BOX-LEVEL</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">são exemplos de caixas inline-level.</a> Vamos ver como isso funciona. </p>










</body>
</html>
